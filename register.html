<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <style>
      .toast {
  position: fixed;
  bottom: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  border: 1px solid #00f2ff;
  transition: 0.4s;
  z-index: 9999;
}

.toast.show {
  bottom: 30px;
}

.toast.error {
  border-color: red;
}

.toast.success {
  border-color: #00f2ff;
}


    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      overflow: hidden;
      color: white;
      perspective: 1000px;
    }

    /* 🌌 background */
    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, #00f2ff22, transparent 40%),
                  radial-gradient(circle at 70% 80%, #ff00ff22, transparent 40%),
                  radial-gradient(circle at 50% 50%, #00ff8822, transparent 50%);
      animation: move 8s infinite alternate;
    }

    @keyframes move {
      0% { transform: scale(1); }
      100% { transform: scale(1.2) translate(-5%, 5%); }
    }

    /* ✨ particles */
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      opacity: 0.5;
      animation: float 6s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    /* 🧊 card */
    .box {
      position: relative;
      z-index: 2;
      width: 340px;
      padding: 30px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 40px rgba(0,255,255,0.2);
      text-align: center;
      transition: transform 0.2s;
    }

    h2 {
      color: #00f2ff;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      outline: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: white;
      transition: 0.3s;
    }

    input:focus {
      box-shadow: 0 0 12px #00f2ff;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .reg {
      background: #00f2ff;
      color: black;
    }

    .reg:hover {
      box-shadow: 0 0 15px #00f2ff;
    }

    .back {
      background: transparent;
      border: 1px solid #00f2ff;
      color: #00f2ff;
    }

    .back:hover {
      background: #00f2ff;
      color: black;
    }

    /* ❌ shake */
    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    .shake {
      animation: shake 0.4s;
    }

    /* ⏳ loader */
    .loader {
      display: none;
      margin-top: 10px;
      border: 3px solid #333;
      border-top: 3px solid #00f2ff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin-left: auto;
      margin-right: auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

  </style>
</head>

<body>
<div id="toast" class="toast"></div>
<div class="bg"></div>
<div id="particles"></div>

<div class="box" id="card">
  <h2>REGISTER</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="reg" onclick="register()">CREATE ACCOUNT</button>
  <button class="back" onclick="goLogin()">BACK</button>

  <div class="loader" id="loader"></div>
</div>

<script type="module">
import { supabase } from './subapi.js'

/* ✨ particles */
function createParticles() {
  const container = document.getElementById("particles")

  for (let i = 0; i < 40; i++) {
    let p = document.createElement("div")
    p.className = "particle"
    p.style.left = Math.random() * 100 + "vw"
    p.style.animationDuration = (3 + Math.random() * 5) + "s"
    container.appendChild(p)
  }
}
createParticles()

/* 🖱️ 3D tilt */
const card = document.getElementById("card")
document.addEventListener("mousemove", (e) => {
  let x = (window.innerWidth / 2 - e.pageX) / 20
  let y = (window.innerHeight / 2 - e.pageY) / 20
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`
})

/* 🔊 sound */
function sound(type) {
  const a = new Audio(type === "error" ? "./error.mp3" : "./success.mp3")
  a.volume = 0.5
  a.play()
}

/* ❌ error */
function error(el) {
  el.classList.add("shake")
  el.style.boxShadow = "0 0 10px red"
  sound("error")

  setTimeout(() => el.classList.remove("shake"), 500)
}

/* ⏳ loader */
function showLoader(show) {
  document.getElementById("loader").style.display = show ? "block" : "none"
}

/* 🚀 REGISTER */
window.register = async function () {
  const email = document.getElementById("email")
  const password = document.getElementById("password")

  // ❌ empty check
  if (!email.value || !password.value) {
    error(password)
    showToast("Барлық өрісті толтыр!", "error")
    return
  }

  // ❌ EMAIL FORMAT CHECK 🔥
  if (!isValidEmail(email.value)) {
    error(email)
    showToast("ошибка , Электронная почта была введена неверно!", "error")
    return
  }
// ❌ PASSWORD MIN LENGTH
if (password.value.length < 5) {
  error(password)
  showToast("ошибка , пароль должен содержать не менее 5 букв!", "error")
  return
}

  showLoader(true)

  const { error: err } = await supabase
    .from("users")
    .insert([
      {
        email: email.value,
        password: password.value,
        role: "user"
      }
    ])

  showLoader(false)

  if (err) {
    error(password)
    showToast("Register error!", "error")
    return
  }

  sound("success")
  showToast("регистрация прошла успешно!", "success")

  setTimeout(() => {
    window.location.href = "index.html"
  }, 700)
}
/* 🔗 back to login */
window.goLogin = function () {
  window.location.href = "index.html"
}

function showToast(message, type) {
  const toast = document.getElementById("toast")

  toast.innerText = message
  toast.className = "toast show " + type

  setTimeout(() => {
    toast.classList.remove("show")
  }, 2000)
}
function isValidEmail(email) {
  return /\S+@\S+\.\S+/.test(email)
}   
</script>

</body>
</html>
